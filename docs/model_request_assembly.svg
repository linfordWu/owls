  <text x="1176" y="1238" class="note">补充：当前仓库里 verbose tracing 已经能打印出 System prompt assembly、API messages before request、API request summary。</text>
  <text x="350" y="1250" class="code">关键代码：run_agent.py::_build_system_prompt / run_conversation / _build_api_kwargs，agent/prompt_builder.py::build_skills_system_prompt / build_context_files_prompt</text>
</svg>