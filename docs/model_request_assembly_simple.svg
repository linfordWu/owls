<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="1600" height="1220" viewBox="0 0 1600 1220">
  <rect x="0" y="0" width="1600" height="1220" fill="#f5f8fb"/>

  <text x="40" y="48" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="30" font-weight="700" fill="#17324d">OSPilot 模型请求拼装流程（极简兼容版）</text>
  <text x="40" y="78" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="16" fill="#55708a">根据项目代码，只展示用户提示词、系统提示词、记忆、skills、context、tools 如何拼成最终模型请求。</text>

  <rect x="40" y="110" width="220" height="1040" rx="18" ry="18" fill="#ffffff" stroke="#d4dfe8" stroke-width="1.5"/>
  <rect x="290" y="110" width="720" height="1040" rx="18" ry="18" fill="#ffffff" stroke="#d4dfe8" stroke-width="1.5"/>
  <rect x="1040" y="110" width="520" height="1040" rx="18" ry="18" fill="#ffffff" stroke="#d4dfe8" stroke-width="1.5"/>

  <text x="105" y="148" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="22" font-weight="700" fill="#17324d">输入源</text>
  <text x="520" y="148" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="22" font-weight="700" fill="#17324d">run_agent.py 编排</text>
  <text x="1205" y="148" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="22" font-weight="700" fill="#17324d">最终模型请求</text>

  <rect x="58" y="190" width="184" height="92" rx="12" ry="12" fill="#f7fbff" stroke="#79a6d0" stroke-width="1.6"/>
  <text x="78" y="222" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="18" font-weight="700" fill="#17324d">用户提示词</text>
  <text x="78" y="250" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="14" fill="#314250">CLI / Gateway 传入</text>
  <text x="78" y="272" font-family="Consolas, Courier New, monospace" font-size="12" fill="#1d5a92">run_conversation(user_message)</text>

  <rect x="58" y="314" width="184" height="116" rx="12" ry="12" fill="#f6fff9" stroke="#7eb28a" stroke-width="1.6"/>
  <text x="78" y="346" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="18" font-weight="700" fill="#17324d">系统提示来源</text>
  <text x="78" y="374" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="14" fill="#314250">SOUL.md / 默认身份</text>
  <text x="78" y="396" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="14" fill="#314250">system_message</text>
  <text x="78" y="418" font-family="Consolas, Courier New, monospace" font-size="12" fill="#1d5a92">_build_system_prompt()</text>

  <rect x="58" y="462" width="184" height="116" rx="12" ry="12" fill="#f6fff9" stroke="#7eb28a" stroke-width="1.6"/>
  <text x="78" y="494" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="18" font-weight="700" fill="#17324d">记忆来源</text>
  <text x="78" y="522" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="14" fill="#314250">memory store</text>
  <text x="78" y="544" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="14" fill="#314250">user profile</text>
  <text x="78" y="566" font-family="Consolas, Courier New, monospace" font-size="12" fill="#1d5a92">format_for_system_prompt()</text>

  <rect x="58" y="610" width="184" height="116" rx="12" ry="12" fill="#f6fff9" stroke="#7eb28a" stroke-width="1.6"/>
  <text x="78" y="642" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="18" font-weight="700" fill="#17324d">Skills 来源</text>
  <text x="78" y="670" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="14" fill="#314250">扫描 skills 目录</text>
  <text x="78" y="692" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="14" fill="#314250">生成 available_skills</text>
  <text x="78" y="714" font-family="Consolas, Courier New, monospace" font-size="12" fill="#1d5a92">build_skills_system_prompt()</text>

  <rect x="58" y="758" width="184" height="116" rx="12" ry="12" fill="#f6fff9" stroke="#7eb28a" stroke-width="1.6"/>
  <text x="78" y="790" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="18" font-weight="700" fill="#17324d">上下文来源</text>
  <text x="78" y="818" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="14" fill="#314250">AGENTS.md / OSPILOT.md</text>
  <text x="78" y="840" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="14" fill="#314250">.cursorrules / CLAUDE.md</text>
  <text x="78" y="862" font-family="Consolas, Courier New, monospace" font-size="12" fill="#1d5a92">build_context_files_prompt()</text>

  <rect x="58" y="906" width="184" height="116" rx="12" ry="12" fill="#fffaf1" stroke="#d7a350" stroke-width="1.6"/>
  <text x="78" y="938" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="18" font-weight="700" fill="#17324d">工具定义来源</text>
  <text x="78" y="966" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="14" fill="#314250">按 toolset 过滤</text>
  <text x="78" y="988" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="14" fill="#314250">最终 self.tools</text>
  <text x="78" y="1010" font-family="Consolas, Courier New, monospace" font-size="12" fill="#1d5a92">get_tool_definitions()</text>

  <rect x="320" y="190" width="660" height="116" rx="14" ry="14" fill="#f7fbff" stroke="#79a6d0" stroke-width="1.6"/>
  <text x="346" y="224" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#17324d">1. 建立本轮 messages</text>
  <text x="346" y="252" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">复制 conversation_history，追加当前 user_message。</text>
  <text x="346" y="276" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">prefill_messages 不直接写入历史，只在 API 调用时临时插入。</text>

  <rect x="320" y="340" width="660" height="238" rx="14" ry="14" fill="#f6fff9" stroke="#7eb28a" stroke-width="1.6"/>
  <text x="346" y="374" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#17324d">2. _build_system_prompt() 构造 cached system prompt</text>
  <text x="346" y="404" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">按顺序拼接：Identity → Tool Guidance → Tool-use Enforcement</text>
  <text x="346" y="428" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">→ Custom system_message → Persistent memory / user profile</text>
  <text x="346" y="452" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">→ Skills system prompt → Project context → 时间 / 模型 / 平台提示</text>
  <text x="346" y="484" font-family="Consolas, Courier New, monospace" font-size="13" fill="#1d5a92">run_agent.py::_build_system_prompt()</text>
  <text x="346" y="508" font-family="Consolas, Courier New, monospace" font-size="13" fill="#1d5a92">agent/prompt_builder.py::load_soul_md / build_skills_system_prompt / build_context_files_prompt</text>

  <rect x="320" y="610" width="660" height="150" rx="14" ry="14" fill="#f6fff9" stroke="#7eb28a" stroke-width="1.6"/>
  <text x="346" y="644" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#17324d">3. 处理记忆与 Honcho 上下文</text>
  <text x="346" y="672" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">首轮可把 Honcho context 烘焙进 cached_system_prompt。</text>
  <text x="346" y="696" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">后续轮次只临时附加到当前 user_message，避免破坏 prompt cache。</text>
  <text x="346" y="728" font-family="Consolas, Courier New, monospace" font-size="13" fill="#1d5a92">run_agent.py::_honcho_context / _honcho_turn_context</text>

  <rect x="320" y="792" width="660" height="218" rx="14" ry="14" fill="#f7fbff" stroke="#79a6d0" stroke-width="1.6"/>
  <text x="346" y="826" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#17324d">4. 生成 api_messages</text>
  <text x="346" y="854" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">从 messages 复制为 api_messages，再叠加 effective_system：</text>
  <text x="346" y="878" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">cached_system_prompt + ephemeral_system_prompt + plugin turn context</text>
  <text x="346" y="902" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">然后临时插入 prefill_messages、应用 prompt caching、sanitize_api_messages()</text>
  <text x="346" y="934" font-family="Consolas, Courier New, monospace" font-size="13" fill="#1d5a92">run_agent.py::effective_system / api_messages</text>
  <text x="346" y="958" font-family="Consolas, Courier New, monospace" font-size="13" fill="#1d5a92">_trace_api_messages() 也会把这一层打印出来</text>

  <rect x="320" y="1042" width="660" height="116" rx="14" ry="14" fill="#fffaf1" stroke="#d7a350" stroke-width="1.6"/>
  <text x="346" y="1076" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#17324d">5. _build_api_kwargs() 组装最终请求</text>
  <text x="346" y="1104" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">把 model、messages 或 input、tools、timeout、reasoning、extra_body 汇总成 API 请求对象。</text>
  <text x="346" y="1128" font-family="Consolas, Courier New, monospace" font-size="13" fill="#1d5a92">run_agent.py::_build_api_kwargs()</text>

  <rect x="1068" y="210" width="466" height="180" rx="14" ry="14" fill="#f7fbff" stroke="#79a6d0" stroke-width="1.6"/>
  <text x="1094" y="244" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#17324d">最终 system</text>
  <text x="1094" y="272" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">effective_system = cached_system_prompt</text>
  <text x="1094" y="296" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">+ ephemeral_system_prompt</text>
  <text x="1094" y="320" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">+ pre_llm_call 插件返回的 context</text>
  <text x="1094" y="352" font-family="Consolas, Courier New, monospace" font-size="13" fill="#1d5a92">注意：用户提示词不在这里，在 messages 里</text>

  <rect x="1068" y="430" width="466" height="232" rx="14" ry="14" fill="#f7fbff" stroke="#79a6d0" stroke-width="1.6"/>
  <text x="1094" y="464" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#17324d">最终 messages / input</text>
  <text x="1094" y="492" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">通常顺序：</text>
  <text x="1114" y="518" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">1) system</text>
  <text x="1114" y="542" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">2) prefill_messages（若配置）</text>
  <text x="1114" y="566" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">3) 历史 user / assistant / tool 消息</text>
  <text x="1114" y="590" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">4) 当前 user_message</text>
  <text x="1114" y="614" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">5) 可选的 Honcho turn context</text>
  <text x="1094" y="640" font-family="Consolas, Courier New, monospace" font-size="13" fill="#1d5a92">api_mode=chat_completions 时是 messages，Responses API 时会转成 input</text>

  <rect x="1068" y="702" width="466" height="158" rx="14" ry="14" fill="#fffaf1" stroke="#d7a350" stroke-width="1.6"/>
  <text x="1094" y="736" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#17324d">最终 tools</text>
  <text x="1094" y="764" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">registry.get_definitions() 返回可用工具 schema。</text>
  <text x="1094" y="788" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">会按 toolset、依赖检查、动态 schema 裁剪后进入请求。</text>
  <text x="1094" y="820" font-family="Consolas, Courier New, monospace" font-size="13" fill="#1d5a92">model_tools.py::get_tool_definitions()</text>

  <rect x="1068" y="900" width="466" height="176" rx="14" ry="14" fill="#f6fff9" stroke="#7eb28a" stroke-width="1.6"/>
  <text x="1094" y="934" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#17324d">最终 API 请求对象</text>
  <text x="1094" y="962" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">_build_api_kwargs() 输出的核心字段：</text>
  <text x="1114" y="988" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">model</text>
  <text x="1114" y="1012" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">messages 或 input</text>
  <text x="1114" y="1036" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">tools</text>
  <text x="1114" y="1060" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="15" fill="#314250">timeout / reasoning / extra_body</text>

  <line x1="242" y1="236" x2="320" y2="236" stroke="#415565" stroke-width="2.4"/>
  <polygon points="320,236 310,231 310,241" fill="#415565"/>

  <line x1="242" y1="372" x2="320" y2="420" stroke="#70869b" stroke-width="2" stroke-dasharray="8 8"/>
  <polygon points="320,420 309,416 313,407" fill="#70869b"/>

  <line x1="242" y1="520" x2="320" y2="486" stroke="#70869b" stroke-width="2" stroke-dasharray="8 8"/>
  <polygon points="320,486 309,484 313,475" fill="#70869b"/>

  <line x1="242" y1="668" x2="320" y2="534" stroke="#70869b" stroke-width="2" stroke-dasharray="8 8"/>
  <polygon points="320,534 312,526 321,522" fill="#70869b"/>

  <line x1="242" y1="816" x2="320" y2="562" stroke="#70869b" stroke-width="2" stroke-dasharray="8 8"/>
  <polygon points="320,562 314,553 323,551" fill="#70869b"/>

  <line x1="242" y1="964" x2="320" y2="1084" stroke="#70869b" stroke-width="2" stroke-dasharray="8 8"/>
  <polygon points="320,1084 310,1079 318,1073" fill="#70869b"/>

  <line x1="650" y1="306" x2="650" y2="340" stroke="#415565" stroke-width="2.4"/>
  <polygon points="650,340 645,330 655,330" fill="#415565"/>
  <line x1="650" y1="578" x2="650" y2="610" stroke="#415565" stroke-width="2.4"/>
  <polygon points="650,610 645,600 655,600" fill="#415565"/>
  <line x1="650" y1="760" x2="650" y2="792" stroke="#415565" stroke-width="2.4"/>
  <polygon points="650,792 645,782 655,782" fill="#415565"/>
  <line x1="650" y1="1010" x2="650" y2="1042" stroke="#415565" stroke-width="2.4"/>
  <polygon points="650,1042 645,1032 655,1032" fill="#415565"/>

  <line x1="980" y1="458" x2="1068" y2="300" stroke="#415565" stroke-width="2.4"/>
  <polygon points="1068,300 1058,304 1061,292" fill="#415565"/>
  <line x1="980" y1="902" x2="1068" y2="552" stroke="#415565" stroke-width="2.4"/>
  <polygon points="1068,552 1060,560 1050,557" fill="#415565"/>
  <line x1="980" y1="1098" x2="1068" y2="782" stroke="#415565" stroke-width="2.4"/>
  <polygon points="1068,782 1060,790 1050,787" fill="#415565"/>
  <line x1="1300" y1="860" x2="1300" y2="900" stroke="#415565" stroke-width="2.4"/>
  <polygon points="1300,900 1295,890 1305,890" fill="#415565"/>

  <text x="320" y="1196" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="13" fill="#6e5319">说明：这个文件使用更保守的 SVG 1.1 语法与基础元素，兼容性比复杂样式版更高。</text>
</svg>