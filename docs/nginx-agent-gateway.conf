# Nginx configuration template for OWLS Agent Gateway.
#
# Place this file in /etc/nginx/sites-available/owls and symlink to
# sites-enabled, then reload nginx.
#
# Features:
#   - HTTPS termination on 443 → forward to OWLS on 9119
#   - WebSocket upgrade support for /ws/* endpoints
#   - Optional: rate limiting, IP allowlisting

upstream owls_backend {
    server 127.0.0.1:9119;
    keepalive 32;
}

# Rate limit zone (optional — uncomment to enable)
# limit_req_zone $binary_remote_addr zone=owls:10m rate=10r/s;

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name owls.example.com;  # <-- change to your domain

    # SSL certificate paths (replace with your actual paths)
    ssl_certificate     /etc/letsencrypt/live/owls.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/owls.example.com/privkey.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static files (if serving web build directly)
    location / {
        proxy_pass http://owls_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket endpoints
    location /ws/ {
        proxy_pass http://owls_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # API endpoints
    location /api/ {
        # Optional rate limiting
        # limit_req zone=owls burst=20 nodelay;

        proxy_pass http://owls_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name owls.example.com;
    return 301 https://$server_name$request_uri;
}
