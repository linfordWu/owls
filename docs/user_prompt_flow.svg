<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1960" viewBox="0 0 2200 1960">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6fbff"/>
      <stop offset="100%" stop-color="#eef5f1"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f4d5a"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2463a6"/>
    </marker>
    <style>
      .title { font: 700 34px 'Noto Sans CJK SC','Microsoft YaHei','PingFang SC',sans-serif; fill: #16324f; }
      .subtitle { font: 400 16px 'Noto Sans CJK SC','Microsoft YaHei','PingFang SC',sans-serif; fill: #496179; }
      .lane-title { font: 700 24px 'Noto Sans CJK SC','Microsoft YaHei','PingFang SC',sans-serif; fill: #17324d; }
      .box-title { font: 700 18px 'Noto Sans CJK SC','Microsoft YaHei','PingFang SC',sans-serif; fill: #17324d; }
      .text { font: 15px 'Noto Sans CJK SC','Microsoft YaHei','PingFang SC',sans-serif; fill: #263746; }
      .small { font: 13px 'Noto Sans CJK SC','Microsoft YaHei','PingFang SC',sans-serif; fill: #506274; }
      .code { font: 13px 'SFMono-Regular','Consolas','Noto Sans Mono CJK SC',monospace; fill: #20507d; }
      .note { font: 13px 'Noto Sans CJK SC','Microsoft YaHei','PingFang SC',sans-serif; fill: #6b4c14; }
      .lane { stroke: #d4e0ea; stroke-width: 1.5; rx: 22; ry: 22; }
      .box { fill: #ffffff; stroke: #a9bfd2; stroke-width: 1.6; rx: 18; ry: 18; }
      .box-blue { fill: #f7fbff; stroke: #6b9fd1; stroke-width: 1.8; rx: 18; ry: 18; }
      .box-green { fill: #f6fff9; stroke: #7ab38a; stroke-width: 1.8; rx: 18; ry: 18; }
      .box-amber { fill: #fffaf1; stroke: #d5a34f; stroke-width: 1.8; rx: 18; ry: 18; }
      .box-red { fill: #fff7f6; stroke: #d27f74; stroke-width: 1.8; rx: 18; ry: 18; }
      .diamond { fill: #ffffff; stroke: #8aa2b8; stroke-width: 1.8; }
      .arrow { stroke: #3f4d5a; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .arrow-blue { stroke: #2463a6; stroke-width: 2.4; fill: none; marker-end: url(#arrowBlue); }
      .arrow-dash { stroke: #6e8398; stroke-width: 2; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow); }
      .divider { stroke: #d4e0ea; stroke-width: 1.2; stroke-dasharray: 7 7; }
    </style>
  </defs>

  <rect x="0" y="0" width="2200" height="1960" fill="url(#bg)"/>

  <text x="60" y="60" class="title">OSPilot：用户提示词从输入到最终回复的代码流程图</text>
  <text x="60" y="92" class="subtitle">中文 SVG 版，节点内直接标出关键文件 / 函数，覆盖：系统提示拼接、Skills、Memory、安全审批、工具调用、模型请求、结果处理与返回</text>

  <rect x="40" y="120" width="270" height="1760" class="lane" fill="#f8fbfd"/>
  <rect x="340" y="120" width="700" height="1760" class="lane" fill="#f9fbff"/>
  <rect x="1070" y="120" width="510" height="1760" class="lane" fill="#fbfdf8"/>
  <rect x="1610" y="120" width="550" height="1760" class="lane" fill="#fcfbff"/>

  <text x="85" y="160" class="lane-title">1. 用户与入口层</text>
  <text x="405" y="160" class="lane-title">2. Agent 编排层</text>
  <text x="1170" y="160" class="lane-title">3. 安全 / 工具层</text>
  <text x="1735" y="160" class="lane-title">4. 模型交互与回包层</text>

  <rect x="70" y="210" width="210" height="115" class="box-blue"/>
  <text x="90" y="240" class="box-title">用户输入提示词</text>
  <text x="90" y="268" class="text">CLI / Gateway / ACP / API Server</text>
  <text x="90" y="292" class="text">把自然语言问题送入 Agent</text>
  <text x="90" y="314" class="code">cli.py / gateway/run.py / acp_adapter/server.py</text>

  <rect x="390" y="210" width="600" height="130" class="box-blue"/>
  <text x="420" y="240" class="box-title">AIAgent.run_conversation() 接管本轮对话</text>
  <text x="420" y="268" class="text">1) 清洗 surrogate 字符，复制历史消息，加入本轮 user message</text>
  <text x="420" y="292" class="text">2) 计算 task_id / 迭代预算 / 中断状态</text>
  <text x="420" y="316" class="code">run_agent.py :: run_conversation()</text>

  <path d="M 280 268 L 390 268" class="arrow"/>

  <rect x="390" y="380" width="600" height="300" class="box-green"/>
  <text x="420" y="412" class="box-title">_build_system_prompt() 拼接系统提示词</text>
  <text x="420" y="442" class="text">按固定顺序组装：</text>
  <text x="440" y="468" class="text">• 身份层：SOUL.md 或 DEFAULT_AGENT_IDENTITY</text>
  <text x="440" y="492" class="text">• 工具行为层：MEMORY_GUIDANCE / SESSION_SEARCH / SKILLS_GUIDANCE</text>
  <text x="440" y="516" class="text">• 用户自定义 system_message</text>
  <text x="440" y="540" class="text">• 记忆注入：memory / user profile</text>
  <text x="440" y="564" class="text">• skills 索引：available_skills 列表</text>
  <text x="440" y="588" class="text">• 项目上下文：AGENTS.md / .cursorrules / OSPILOT.md</text>
  <text x="440" y="612" class="text">• 会话元数据：时间、模型、Provider、平台提示</text>
  <text x="420" y="646" class="code">run_agent.py :: _build_system_prompt()</text>
  <text x="420" y="668" class="code">agent/prompt_builder.py :: load_soul_md() / build_context_files_prompt()</text>

  <path d="M 690 340 L 690 380" class="arrow"/>

  <rect x="1095" y="390" width="460" height="145" class="box-green"/>
  <text x="1120" y="420" class="box-title">Memory 如何参与</text>
  <text x="1120" y="448" class="text">启动时：MemoryStore.format_for_system_prompt()</text>
  <text x="1120" y="472" class="text">把 memory / user 两类记忆注入系统提示</text>
  <text x="1120" y="496" class="text">运行中：memory 工具可即时读写记忆</text>
  <text x="1120" y="520" class="code">run_agent.py L2793-L2798 / memory tool</text>

  <rect x="1095" y="560" width="460" height="145" class="box-green"/>
  <text x="1120" y="590" class="box-title">Skill 如何参与</text>
  <text x="1120" y="618" class="text">build_skills_system_prompt() 扫描本地 / 外部 skills</text>
  <text x="1120" y="642" class="text">把可用技能写成 available_skills 索引给模型</text>
  <text x="1120" y="666" class="text">模型命中任务后再调用 skill_view / skill_manage</text>
  <text x="1120" y="690" class="code">agent/prompt_builder.py :: build_skills_system_prompt()</text>

  <path d="M 990 470 L 1095 470" class="arrow-dash"/>
  <path d="M 990 620 L 1095 620" class="arrow-dash"/>

  <rect x="390" y="730" width="600" height="250" class="box-blue"/>
  <text x="420" y="762" class="box-title">准备发给大模型的输入</text>
  <text x="420" y="790" class="text">1) 基于 messages 生成 api_messages</text>
  <text x="440" y="814" class="text">• 复用 cached system prompt</text>
  <text x="440" y="838" class="text">• 叠加 ephemeral_system_prompt / plugin context</text>
  <text x="440" y="862" class="text">• 注入 prefill_messages / Honcho turn context</text>
  <text x="440" y="886" class="text">• 追加 tools 定义、prompt caching、sanitize_api_messages()</text>
  <text x="420" y="920" class="text">2) 新增 verbose tracing：把最终系统提示、api_messages、request summary 打印出来</text>
  <text x="420" y="952" class="code">run_agent.py :: _trace_sections() / _trace_api_messages() / _trace_api_request()</text>

  <path d="M 690 680 L 690 730" class="arrow"/>

  <rect x="1670" y="745" width="430" height="210" class="box-blue"/>
  <text x="1700" y="775" class="box-title">构造模型请求并发给 Provider</text>
  <text x="1700" y="803" class="text">_build_api_kwargs() 负责组包：</text>
  <text x="1720" y="829" class="text">• model / messages / tools / timeout</text>
  <text x="1720" y="853" class="text">• reasoning / extra_body / provider preferences</text>
  <text x="1720" y="877" class="text">• 按 api_mode 选择 chat / responses / anthropic messages</text>
  <text x="1700" y="909" class="text">随后走 _interruptible_streaming_api_call()</text>
  <text x="1700" y="931" class="text">或 _interruptible_api_call() 发 HTTP 请求</text>
  <text x="1700" y="953" class="code">run_agent.py :: _build_api_kwargs() / _interruptible_*_api_call()</text>

  <path d="M 990 860 L 1670 860" class="arrow"/>

  <rect x="1670" y="1010" width="430" height="210" class="box-blue"/>
  <text x="1700" y="1040" class="box-title">模型返回后先做归一化与输出追踪</text>
  <text x="1700" y="1068" class="text">• 按 api_mode 解析 response</text>
  <text x="1700" y="1092" class="text">• normalize_anthropic_response() / _normalize_codex_response()</text>
  <text x="1700" y="1116" class="text">• 提取 content / reasoning / reasoning_details / tool_calls</text>
  <text x="1700" y="1140" class="text">• _trace_model_output() 打印“模型输出”</text>
  <text x="1700" y="1164" class="text">• _build_assistant_message() 规范化 assistant 消息结构</text>
  <text x="1700" y="1190" class="code">run_agent.py :: _trace_model_output() / _build_assistant_message()</text>

  <path d="M 1885 955 L 1885 1010" class="arrow"/>

  <polygon points="1885,1270 2010,1365 1885,1460 1760,1365" class="diamond"/>
  <text x="1834" y="1352" class="box-title">模型是否返回</text>
  <text x="1826" y="1376" class="box-title">tool_calls？</text>

  <path d="M 1885 1220 L 1885 1270" class="arrow"/>
  <text x="2025" y="1338" class="small">否：直接走最终回复</text>
  <text x="1510" y="1338" class="small">是：进入工具执行</text>

  <rect x="1120" y="1260" width="410" height="190" class="box-amber"/>
  <text x="1145" y="1290" class="box-title">工具执行主路径</text>
  <text x="1145" y="1318" class="text">1) run_agent.py :: _execute_tool_calls()</text>
  <text x="1145" y="1342" class="text">2) 先校验 tool name / JSON arguments</text>
  <text x="1145" y="1366" class="text">3) memory / todo / session_search / delegate_task</text>
  <text x="1165" y="1390" class="text">由 Agent loop 直接拦截</text>
  <text x="1145" y="1414" class="text">4) 其他工具走 handle_function_call() → registry.dispatch()</text>
  <text x="1145" y="1438" class="code">model_tools.py :: handle_function_call()</text>

  <path d="M 1760 1365 L 1530 1365" class="arrow"/>

  <rect x="1120" y="1490" width="410" height="220" class="box-red"/>
  <text x="1145" y="1520" class="box-title">安全机制审批：主要发生在 terminal 工具前</text>
  <text x="1145" y="1548" class="text">terminal_tool 先调用 check_all_command_guards()</text>
  <text x="1165" y="1572" class="text">• detect_dangerous_command() 检测 rm / sudo / 写 /etc 等模式</text>
  <text x="1165" y="1596" class="text">• tirith_security 做更细粒度安全扫描</text>
  <text x="1165" y="1620" class="text">• CLI：prompt_dangerous_approval() 交互审批</text>
  <text x="1165" y="1644" class="text">• Gateway：submit_pending()，等待 /approve 或 /deny</text>
  <text x="1145" y="1672" class="text">审批通过才真正执行命令；拒绝则返回 BLOCKED 文本</text>
  <text x="1145" y="1698" class="code">tools/terminal_tool.py + tools/approval.py</text>

  <path d="M 1325 1450 L 1325 1490" class="arrow"/>

  <rect x="70" y="1510" width="210" height="150" class="box-amber"/>
  <text x="92" y="1540" class="box-title">审批交互回到用户</text>
  <text x="92" y="1568" class="text">CLI：用户选 once / session / always / deny</text>
  <text x="92" y="1592" class="text">Gateway：用户发 /approve 或 /deny</text>
  <text x="92" y="1616" class="text">审批结果回到 pending approval 状态机</text>
  <text x="92" y="1640" class="code">gateway/run.py :: /approve / /deny</text>

  <path d="M 1120 1600 L 280 1600" class="arrow-blue"/>
  <path d="M 280 1600 L 280 1710 L 1325 1710" class="arrow-blue"/>

  <rect x="390" y="1505" width="600" height="205" class="box-green"/>
  <text x="420" y="1535" class="box-title">工具结果如何回填消息历史</text>
  <text x="420" y="1563" class="text">每个工具结果被包装成 role=tool 消息，追加到 messages</text>
  <text x="420" y="1587" class="text">如果工具失败，会把错误文本也作为 tool content 回给模型</text>
  <text x="420" y="1611" class="text">若本轮有 tool_calls，Agent 继续下一次循环，把 messages 再发给模型</text>
  <text x="420" y="1635" class="text">形成“模型 → 工具 → 模型”的闭环，直到没有 tool_calls</text>
  <text x="420" y="1661" class="code">run_agent.py :: messages.append(tool_msg) + while loop</text>

  <path d="M 1530 1365 L 1460 1365 L 1460 1475 L 990 1475" class="arrow"/>
  <path d="M 390 1608 L 350 1608 L 350 860 L 390 860" class="arrow-dash"/>
  <text x="358" y="892" class="small">带着 tool 结果回到下一轮 API 调用</text>

  <rect x="1670" y="1495" width="430" height="165" class="box-green"/>
  <text x="1700" y="1525" class="box-title">没有 tool_calls：形成最终回答</text>
  <text x="1700" y="1553" class="text">assistant content 成为 final_response</text>
  <text x="1700" y="1577" class="text">并保留 last_reasoning / usage / 完整 messages</text>
  <text x="1700" y="1601" class="text">随后触发会话结束钩子与可选的背景回顾</text>
  <text x="1700" y="1627" class="code">run_agent.py :: result = { final_response, messages, ... }</text>

  <path d="M 2010 1365 L 2080 1365 L 2080 1495" class="arrow"/>

  <rect x="390" y="1750" width="600" height="100" class="box"/>
  <text x="420" y="1780" class="box-title">回写与长期记忆的后处理</text>
  <text x="420" y="1808" class="text">final_response 发送后，如达到阈值，会在后台 _spawn_background_review() 审查是否保存 memory / 更新 skill</text>
  <text x="420" y="1832" class="text">CLI 退出时还会 flush_memories()；对话历史与 token 统计会落到 SessionDB(SQLite)</text>

  <path d="M 1670 1580 L 990 1580 L 990 1800" class="arrow-dash"/>

  <rect x="70" y="1730" width="210" height="120" class="box-blue"/>
  <text x="92" y="1760" class="box-title">最终返回给用户</text>
  <text x="92" y="1788" class="text">CLI：渲染响应框 / reasoning box</text>
  <text x="92" y="1812" class="text">Gateway：把 final_response 发回聊天平台</text>
  <text x="92" y="1836" class="code">cli.py / gateway/run.py</text>

  <path d="M 1670 1578 L 280 1578 L 280 1730" class="arrow"/>

  <line x1="1040" y1="340" x2="1560" y2="340" class="divider"/>
  <text x="1085" y="330" class="note">说明：Skills 与 Memory 既参与“系统提示拼接”，也可能在工具执行或后台回顾中再次被调用。</text>

  <line x1="1040" y1="1865" x2="2140" y2="1865" class="divider"/>
  <text x="1085" y="1892" class="note">本图对应的 tracing 打印位置：System prompt assembly / API messages before request / API request summary / Model output。</text>
</svg>